<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Frame Extractor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .frame-container {
      background: #222;
      border: 1px solid #333;
      padding: 10px;
      text-align: center;
      border-radius: 4px;
    }
    canvas {
      width: 100%;
      height: auto;
      border: 1px solid #444;
      background: #000;
    }
    .info {
      font-size: 14px;
      margin-top: 5px;
      color: #aaa;
    }
    #status {
      font-size: 18px;
      font-weight: bold;
      color: #0f0;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Video Frame Extractor</h1>
  <div id="status">Loading video...</div>
  <div id="meta"></div>
  <div class="grid" id="grid"></div>

  <video id="video" src="videos/liquidglass.mp4" muted style="display:none;" crossorigin="anonymous"></video>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const meta = document.getElementById('meta');
    const grid = document.getElementById('grid');

    video.addEventListener('loadedmetadata', async () => {
      const duration = video.duration;
      const width = video.videoWidth;
      const height = video.videoHeight;
      
      meta.innerHTML = `Duration: ${duration.toFixed(2)}s | Resolution: ${width}x${height}`;
      status.innerText = "Extracting frames...";

      // Seek and capture frames every 0.15 seconds
      const interval = 0.15;
      for (let t = 0; t <= duration; t += interval) {
        await seekToTime(t);
        captureFrame(t);
      }
      status.innerText = "Extraction complete! All frames displayed below.";
    });

    function seekToTime(time) {
      return new Promise((resolve) => {
        video.currentTime = time;
        video.addEventListener('seeked', function onSeeked() {
          video.removeEventListener('seeked', onSeeked);
          resolve();
        });
      });
    }

    function captureFrame(time) {
      const container = document.createElement('div');
      container.className = 'frame-container';

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const label = document.createElement('div');
      label.className = 'info';
      label.innerText = `Time: ${time.toFixed(2)}s`;

      container.appendChild(canvas);
      container.appendChild(label);
      grid.appendChild(container);
    }

    video.addEventListener('error', (e) => {
      status.innerText = "Error loading video: " + (video.error ? video.error.message : "unknown error");
      status.style.color = 'red';
    });
  </script>
</body>
</html>
